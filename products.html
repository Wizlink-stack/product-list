<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            padding: 30px 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(79, 172, 254, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(79, 172, 254, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            bottom: -50%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 25s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(40px, 40px) rotate(180deg); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 25px 35px;
            border-radius: 12px;
            margin-bottom: 35px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            background: linear-gradient(135deg, #0f2027 0%, #2c5364 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            text-align: right;
            font-size: 13px;
            color: #666;
        }

        .user-name {
            font-weight: 600;
            color: #333;
        }

        .logout-btn {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(231, 76, 60, 0.2);
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(231, 76, 60, 0.3);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
        }

        .search-input:focus {
            outline: none;
            border-color: #2c5364;
            box-shadow: 0 0 0 4px rgba(44,83,100,0.1);
        }

        .add-btn {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 20px rgba(39,174,96,0.3);
            transition: all 0.3s ease;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(39,174,96,0.4);
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .edit-btn, .delete-btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .edit-btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }

        .delete-btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .edit-btn:hover, .delete-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal h3 {
            margin-bottom: 20px;
            color: #0f2027;
            font-size: 24px;
        }

        .modal .form-group {
            margin-bottom: 20px;
        }

        .modal label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 13px;
        }

        .modal input, .modal select, .modal textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }

        .modal input:focus, .modal select:focus, .modal textarea:focus {
            outline: none;
            border-color: #2c5364;
        }

        .modal textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
        }

        .save-btn {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }

        .cancel-btn {
            background: #95a5a6;
            color: white;
        }

        .close-btn {
            background: #e74c3c;
            color: white;
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .section-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(79, 172, 254, 0.2);
            border-color: rgba(79, 172, 254, 0.3);
        }

        .product-image-wrapper {
            position: relative;
            width: 100%;
            height: 220px;
            overflow: hidden;
            background: linear-gradient(135deg, #f0f0f0 0%, #e8e8e8 100%);
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 15px;
            font-weight: 600;
            color: #0f2027;
            margin-bottom: 10px;
            word-break: break-word;
            line-height: 1.4;
        }

        .product-details {
            font-size: 12px;
            color: #999;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .product-badge {
            display: inline-block;
            background: linear-gradient(135deg, #0f2027 0%, #2c5364 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .no-images {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            color: #999;
            font-size: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }

            header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            .header-right {
                flex-direction: column;
                width: 100%;
            }

            h1 {
                font-size: 24px;
            }

            .logout-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Product Portal</h1>
            <div class="header-right">
                <div class="user-info">
                    <div class="user-name" id="userName">Welcome User</div>
                    <div>Logged in</div>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </header>

        <div class="section-title">✨ Featured Products</div>
        <div class="controls">
            <input type="text" class="search-input" id="searchInput" placeholder="Search products by name or description...">
            <button class="add-btn" onclick="openAddModal()">+ Add Product</button>
        </div>
        <div class="products-grid" id="productsContainer">
            <div class="no-images">Loading products...</div>
        </div>
        <!-- Add Product Modal -->
        <div id="addModal" class="modal">
            <div class="modal-content">
                <button class="close-btn" onclick="closeModal()">&times;</button>
                <h3>Add New Product</h3>
                <form id="addForm">
                    <div class="form-group">
                        <label for="addName">Name</label>
                        <input type="text" id="addName" required>
                    </div>
                    <div class="form-group">
                        <label for="addDescription">Description</label>
                        <textarea id="addDescription"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="addPrice">Price ($)</label>
                        <input type="number" id="addPrice" step="0.01" min="0">
                    </div>
                    <div class="form-group">
                        <label for="addStatus">Status</label>
                        <select id="addStatus">
                            <option value="Available">Available</option>
                            <option value="Draft">Draft</option>
                            <option value="Out of Stock">Out of Stock</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="addSku">SKU</label>
                        <input type="text" id="addSku">
                    </div>
                    <div class="modal-buttons">
                        <button type="button" class="modal-btn cancel-btn" onclick="closeModal()">Cancel</button>
                        <button type="submit" class="modal-btn save-btn">Save Product</button>
                    </div>
                </form>
            </div>
        </div>
        <!-- Edit Product Modal -->
        <div id="editModal" class="modal">
            <div class="modal-content">
                <button class="close-btn" onclick="closeModal()">×</button>
                <h3>Edit Product</h3>
                <form id="editForm">
                    <input type="hidden" id="editId">
                    <div class="form-group">
                        <label for="editName">Name</label>
                        <input type="text" id="editName" required>
                    </div>
                    <div class="form-group">
                        <label for="editDescription">Description</label>
                        <textarea id="editDescription"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="editPrice">Price ($)</label>
                        <input type="number" id="editPrice" step="0.01" min="0">
                    </div>
                    <div class="form-group">
                        <label for="editStatus">Status</label>
                        <select id="editStatus">
                            <option value="Available">Available</option>
                            <option value="Draft">Draft</option>
                            <option value="Out of Stock">Out of Stock</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editSku">SKU</label>
                        <input type="text" id="editSku">
                    </div>
                    <div class="modal-buttons">
                        <button type="button" class="modal-btn cancel-btn" onclick="closeModal()">Cancel</button>
                        <button type="submit" class="modal-btn save-btn">Update Product</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const VISITOR_STORAGE_KEY = "productPortalVisitor";
        const STATIC_PRODUCTS = [
            {
                id: 1,
                name: ",",
                imageUrl: "/api/product-images/1",
                status: "Available",
                sku: "Product #001"
            },
            {
                id: 2,
                name: "Indian container cargo volume to grow at 8% in FY25_ CareEdge Ratings",
                imageUrl: "/api/product-images/2",
                status: "Available",
                sku: "Product #002"
            }
        ];

        const FALLBACK_IMAGE_DATA_URL = "data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22280%22 height=%22220%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22280%22 height=%22220%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2216%22 fill=%22%23999%22 text-anchor=%22middle%22 dy=%22.3em%22%3EImage Not Found%3C/text%3E%3C/svg%3E";

        function getVisitorSession() {
            try {
                const raw = localStorage.getItem(VISITOR_STORAGE_KEY);
                return raw ? JSON.parse(raw) : null;
            } catch (error) {
                return null;
            }
        }

        function renderProducts() {
            const container = document.getElementById("productsContainer");
            const userName = document.getElementById("userName");
            const visitor = getVisitorSession();
            userName.textContent = `Welcome ${(visitor && visitor.name) || "Visitor"}`;

            if (!STATIC_PRODUCTS.length) {
                container.innerHTML = '<div class="no-images">No products available right now.</div>';
                return;
            }

            container.innerHTML = "";

            STATIC_PRODUCTS.forEach((product) => {
                const card = document.createElement("div");
                card.className = "product-card";
                const imageSrc = product.imageUrl;

                card.innerHTML = `
                    <div class="product-image-wrapper">
                        <img src="${imageSrc}" alt="${product.name}" class="product-image" loading="lazy">
                    </div>
                    <div class="product-info">
                        <div class="product-name">${product.name.substring(0, 60)}</div>
                        <div class="product-details">${product.sku}</div>
                        <span class="product-badge">${product.status}</span>
                    </div>
                `;

                container.appendChild(card);

                const imageElement = card.querySelector(".product-image");
                imageElement.addEventListener("error", () => {
                    imageElement.src = FALLBACK_IMAGE_DATA_URL;
                }, { once: true });
            });
        }

        function logout() {
            if (!confirm("Are you sure you want to logout?")) {
                return;
            }

            localStorage.removeItem(VISITOR_STORAGE_KEY);
            window.location.href = "index.html";
        }

        window.addEventListener("load", renderProducts);
    </script>
</body>
</html>
